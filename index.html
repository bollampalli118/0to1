<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>0 to 1</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:sans-serif;background:#0D0F14;color:#fff}
header{padding:16px;color:#C9A84C;font-size:20px}
.section{padding:16px}
.card{background:#1A1E2A;padding:16px;border-radius:12px;margin-bottom:16px}
.big{font-size:38px;font-weight:bold}
.row{display:flex;justify-content:space-between;margin-top:8px}
input{width:100%;padding:10px;border-radius:8px;border:none;margin-top:8px}
</style>
</head>

<body>

<header>0 to 1</header>

<!-- OVERVIEW -->
<div class="section">
<div class="card">
<div>Net Worth</div>
<div class="big" id="nw">₹0</div>
<div id="trend"></div>
</div>
</div>

<!-- ASSETS -->
<div class="section">
<div class="card">
<div>Assets</div>
<div class="row"><span>Gold</span><span id="gold">₹0</span></div>
<div class="row"><span>Silver</span><span id="silver">₹0</span></div>
</div>
</div>

<!-- INCOME -->
<div class="section">
<div class="card">
<div>Income</div>
<input id="income" placeholder="Enter monthly income">
<div class="row"><span>Total</span><span id="incomeVal">₹0</span></div>
</div>
</div>

<!-- EXPENSE -->
<div class="section">
<div class="card">
<div>Expense</div>
<input id="expense" placeholder="Enter monthly expense">
<div class="row"><span>Total</span><span id="expenseVal">₹0</span></div>
</div>
</div>

<!-- AI -->
<div class="section">
<div class="card">
<div>AI Advisor</div>
<div id="chat"></div>
<input placeholder="Ask..." onkeydown="if(event.key==='Enter')askAI(this.value)">
</div>
</div>

<script>

let S={
goldRate:5800,
silverRate:80,
goldGrams:550,
silverGrams:3000,
income:0,
expense:0,
history:[]
};

function calc(){
let gold=S.goldRate*S.goldGrams;
let silver=S.silverRate*S.silverGrams;
let nw=gold+silver;

document.getElementById("nw").innerText=fmt(nw);
document.getElementById("gold").innerText=fmt(gold);
document.getElementById("silver").innerText=fmt(silver);

trend(nw);
}

function trend(nw){
let prev=S.history[S.history.length-1];
if(prev){
let diff=nw-prev;
let t=document.getElementById("trend");
t.innerText=(diff>=0?"↑ ":"↓ ")+fmt(diff);
t.style.color=diff>=0?"green":"red";
}
S.history.push(nw);
}

function askAI(q){
q=q.toLowerCase();

let inc=S.income;
let exp=S.expense;

let ans="";

if(q.includes("safe")){
ans = exp < inc ? "You are financially stable" : "Risk: expenses > income";
}
else if(q.includes("improve")){
ans="Reduce expense and increase income streams";
}
else if(q.includes("net")){
ans=document.getElementById("nw").innerText;
}
else{
ans="Ask about safety, improve, net worth";
}

document.getElementById("chat").innerHTML += "<div>> "+q+"</div><div>"+ans+"</div>";
}

document.getElementById("income").addEventListener("input",e=>{
S.income=Number(e.target.value||0);
document.getElementById("incomeVal").innerText=fmt(S.income);
});

document.getElementById("expense").addEventListener("input",e=>{
S.expense=Number(e.target.value||0);
document.getElementById("expenseVal").innerText=fmt(S.expense);
});

async function fetchRates(){
try{
let r=await fetch("https://api.metals.live/v1/spot");
let d=await r.json();

let g=d.find(x=>x.gold)?.gold;
let s=d.find(x=>x.silver)?.silver;

if(g) S.goldRate=Math.round((g*85)/31.1);
if(s) S.silverRate=Math.round((s*85)/31.1);

calc();
}catch(e){}
}

function fmt(n){return "₹"+Math.round(n).toLocaleString("en-IN")}

calc();
fetchRates();

</script>

</body>
</html>
