<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>0 to 1</title>

<style>
:root{
--gold:#C9A84C;
--bg:#0D0F14;
--card:#1A1E2A;
--text:#ffffff;
--muted:#9aa0aa;
--green:#4CAF7D;
--red:#E05C5C;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
font-size:16px;
}

header{
position:sticky;
top:0;
background:#0D0F14;
padding:18px;
font-size:22px;
color:var(--gold);
border-bottom:1px solid #222;
z-index:10;
}

.section{
padding:16px;
}

.card{
background:var(--card);
padding:18px;
border-radius:14px;
margin-bottom:16px;
}

.big{
font-size:44px;
font-weight:bold;
}

.label{
color:var(--muted);
font-size:14px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:18px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:var(--gold);
color:#000;
font-weight:bold;
}

</style>
</head>

<body>

<header>0 to 1</header>

<div class="section">

<!-- ACTION -->
<div class="card">
<div class="label">🧠 Today’s Action</div>
<div id="action" class="row"></div>
</div>

<!-- NET WORTH -->
<div class="card">
<div class="label">Net Worth</div>
<div class="big" id="nw">₹0</div>
<div id="trend"></div>
</div>

<!-- ASSETS -->
<div class="card">
<div class="label">Assets</div>
<div class="row"><span>Gold</span><span id="gold">₹0</span></div>
<div class="row"><span>Silver</span><span id="silver">₹0</span></div>
</div>

<!-- INCOME -->
<div class="card">
<div class="label">Monthly Income</div>
<input id="income" placeholder="Enter income">
<div class="row"><span>Total</span><span id="incVal">₹0</span></div>
</div>

<!-- EXPENSE -->
<div class="card">
<div class="label">Monthly Expense</div>
<input id="expense" placeholder="Enter expense">
<div class="row"><span>Total</span><span id="expVal">₹0</span></div>
</div>

<!-- RUNWAY -->
<div class="card">
<div class="label">Runway</div>
<div class="big" id="runway">0</div>
<div id="runwayStatus"></div>
</div>

<!-- AI -->
<div class="card">
<div class="label">AI Advisor</div>
<div id="chat"></div>
<input placeholder="Ask..." onkeydown="if(event.key==='Enter')askAI(this.value)">
</div>

</div>

<script>

let S={
goldRate:5800,
silverRate:80,
goldGrams:550,
silverGrams:3000,
income:0,
expense:0,
history:[]
};

function save(){
localStorage.setItem("data",JSON.stringify(S));
}

function load(){
let d=localStorage.getItem("data");
if(d) S=JSON.parse(d);
}

function fmt(n){
return "₹"+Math.round(n).toLocaleString("en-IN");
}

function calc(){

let gold=S.goldRate*S.goldGrams;
let silver=S.silverRate*S.silverGrams;
let nw=gold+silver;

document.getElementById("nw").innerText=fmt(nw);
document.getElementById("gold").innerText=fmt(gold);
document.getElementById("silver").innerText=fmt(silver);

document.getElementById("incVal").innerText=fmt(S.income);
document.getElementById("expVal").innerText=fmt(S.expense);

trend(nw);
runway();
action();

save();
}

function trend(nw){
let prev=S.history[S.history.length-1];
if(prev){
let diff=nw-prev;
let t=document.getElementById("trend");
t.innerText=(diff>=0?"↑ ":"↓ ")+fmt(diff);
t.style.color=diff>=0?"green":"red";
}
S.history.push(nw);
}

function runway(){
let m= (S.income - S.expense) <=0 ? 0 :
Math.floor((S.income)/(S.expense||1));

document.getElementById("runway").innerText=m+" months";

let txt="";

if(m<3) txt="🚨 Critical";
else if(m<6) txt="⚠ Risk";
else if(m<12) txt="👍 Stable";
else txt="🟢 Strong";

document.getElementById("runwayStatus").innerText=txt;
}

function action(){

let txt="";

if(S.expense>S.income){
txt="Cut expenses immediately";
}
else if(S.income - S.expense < 20000){
txt="Increase income buffer";
}
else{
txt="Stable. Focus on growth";
}

document.getElementById("action").innerText=txt;
}

document.getElementById("income").addEventListener("input",e=>{
S.income=Number(e.target.value||0);
calc();
});

document.getElementById("expense").addEventListener("input",e=>{
S.expense=Number(e.target.value||0);
calc();
});

function askAI(q){

let ans="";

if(q.includes("safe")){
ans=S.income>S.expense?"You are safe":"You are at risk";
}
else if(q.includes("net")){
ans=document.getElementById("nw").innerText;
}
else{
ans="Track income, control expense, grow assets";
}

document.getElementById("chat").innerHTML+="<div>>"+q+"</div><div>"+ans+"</div>";
}

async function fetchRates(){
try{
let r=await fetch("https://api.metals.live/v1/spot");
let d=await r.json();

let g=d.find(x=>x.gold)?.gold;
let s=d.find(x=>x.silver)?.silver;

if(g) S.goldRate=Math.round((g*85)/31.1);
if(s) S.silverRate=Math.round((s*85)/31.1);

calc();
}catch(e){}
}

load();
calc();
fetchRates();

</script>

</body>
</html>
